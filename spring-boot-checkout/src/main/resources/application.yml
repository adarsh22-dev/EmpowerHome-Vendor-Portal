server:
  port: 8080

spring:
  application:
    name: nexus-checkout-service

  datasource:
    url: jdbc:postgresql://localhost:5432/nexus_checkout
    username: ${DB_USER:nexus}
    password: ${DB_PASS:nexus}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      timeout: 2000ms

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

fraud:
  rate-limit:
    max-orders-per-minute: 10
    max-orders-per-email-5min: 3
    max-orders-per-ip-minute: 5
  risk-threshold: 50

jwt:
  secret: ${JWT_SECRET:nexus-checkout-secret-key-change-in-prod}
  expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  metrics:
    export:
      prometheus:
        enabled: true
